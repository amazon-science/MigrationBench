site_name: MigrationBench
site_description: Repository-Level Code Migration Benchmark from Java 8
site_author: Amazon Science
site_url: https://amazon-science.github.io/MigrationBench

repo_name: amazon-science/MigrationBench
repo_url: https://github.com/amazon-science/MigrationBench

theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tabs.sticky
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy

nav:
  - Home: index.md
  - Leaderboard: leaderboard.md
  - Getting Started: getting-started.md
  - Datasets: datasets.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - attr_list
  - md_in_html

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/amazon-science/MigrationBench
    - icon: fontawesome/solid/paper-plane
      link: https://arxiv.org/abs/2505.09569

extra_css:
  - stylesheets/extra.css
